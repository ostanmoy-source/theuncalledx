<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex, nofollow"><title>Admin - The Uncalled X</title><style>:root{--primary:#00FF00;--dark:#0a0a0a;--darker:#000000;--white:#FFF;--gray:#1a1a1a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--darker);color:var(--white)}.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark),var(--darker))}.login-form{background:linear-gradient(135deg,var(--gray),var(--dark));border:2px solid var(--primary);padding:3rem;border-radius:0;max-width:400px;width:100%;box-shadow:0 0 40px rgba(0,255,0,0.15)}.login-form h2{text-align:center;margin-bottom:2rem;color:var(--primary);font-family:'Bebas Neue',sans-serif;text-transform:uppercase}.form-group{margin-bottom:1.5rem}.form-group label{display:block;margin-bottom:0.5rem;font-weight:600;color:var(--primary)}.form-group input{width:100%;padding:0.8rem;background:var(--darker);border:2px solid var(--primary);color:var(--white);font-family:'Inter',sans-serif}.btn{width:100%;padding:0.8rem;background:var(--primary);color:var(--darker);border:none;font-weight:700;cursor:pointer;font-family:'Bebas Neue',sans-serif;text-transform:uppercase;margin-top:1rem;transition:all 0.3s}.btn:hover{box-shadow:0 0 30px rgba(0,255,0,0.7)}.error{color:#ff4444;font-size:0.85rem;margin-top:0.3rem;display:none}.error.show{display:block}.admin-container{display:none;min-height:100vh;background:var(--darker)}.admin-container.active{display:flex;flex-direction:column}.admin-header{background:linear-gradient(135deg,var(--dark),var(--darker));padding:2rem;border-bottom:2px solid var(--primary);display:flex;justify-content:space-between;align-items:center}.admin-header h1{color:var(--primary);font-family:'Bebas Neue',sans-serif}.logout-btn{padding:0.6rem 1.5rem;background:#ff4444;color:var(--white);border:none;cursor:pointer;font-weight:600}.admin-content{display:flex;flex:1}.sidebar{width:250px;background:var(--gray);border-right:2px solid var(--primary);padding:2rem 0}.sidebar-item{padding:1rem 1.5rem;cursor:pointer;border-left:4px solid transparent;transition:all 0.3s;font-weight:600}.sidebar-item:hover{background:var(--dark);border-left-color:var(--primary)}.sidebar-item.active{background:var(--dark);border-left-color:var(--primary);color:var(--primary)}.main-content{flex:1;overflow-y:auto;padding:2rem}.tab-content{display:none}.tab-content.active{display:block}.content-header{margin-bottom:2rem;padding-bottom:1rem;border-bottom:2px solid var(--primary)}.content-header h2{color:var(--primary);font-family:'Bebas Neue',sans-serif}table{width:100%;border-collapse:collapse;margin-bottom:2rem}th{background:var(--gray);padding:1rem;text-align:left;border-bottom:2px solid var(--primary);font-weight:700;text-transform:uppercase;font-size:0.8rem}td{padding:1rem;border-bottom:1px solid var(--gray)}.action-btn{padding:0.4rem 0.8rem;margin-right:0.5rem;border:none;border-radius:0;cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.3s}.action-btn.edit{background:#64a6ff;color:var(--darker)}.action-btn.delete{background:#ff4444;color:var(--white)}.action-btn:hover{transform:scale(1.05)}.add-btn{padding:0.8rem 1.5rem;background:var(--primary);color:var(--darker);border:none;cursor:pointer;font-weight:700;margin-bottom:1.5rem;text-transform:uppercase}.empty-state{text-align:center;padding:3rem;color:#666}@media(max-width:768px){.sidebar{width:100%;max-height:200px;overflow-x:auto;border-right:none;border-bottom:2px solid var(--primary);display:flex}}</style></head><body><div class="login-screen" id="loginScreen"><div class="login-form"><h2>Admin Panel</h2><form id="loginForm"><div class="form-group"><label>Email</label><input type="email" id="email" required><div class="error" id="emailError"></div></div><div class="form-group"><label>Password</label><input type="password" id="password" required><div class="error" id="passwordError"></div></div><button type="submit" class="btn">Sign In</button><div class="error" id="loginError"></div></form></div></div><div class="admin-container" id="adminContainer"><div style="display:flex;flex-direction:column;width:100%;height:100vh"><div class="admin-header"><h1>ADMIN PANEL</h1><button class="logout-btn" id="logoutBtn">Logout</button></div><div class="admin-content"><div class="sidebar"><div class="sidebar-item active" data-tab="players">Players</div><div class="sidebar-item" data-tab="fixtures">Fixtures</div><div class="sidebar-item" data-tab="news">News</div><div class="sidebar-item" data-tab="gallery">Gallery</div><div class="sidebar-item" data-tab="applications">Applications</div></div><div class="main-content"><div class="tab-content active" id="playersTab"><div class="content-header"><h2>Players</h2></div><button class="add-btn" onclick="alert('Add player form would go here')">+ Add Player</button><div id="playersTable"></div></div><div class="tab-content" id="fixturesTab"><div class="content-header"><h2>Fixtures</h2></div><button class="add-btn" onclick="alert('Add fixture form would go here')">+ Add Fixture</button><div id="fixturesTable"></div></div><div class="tab-content" id="newsTab"><div class="content-header"><h2>News</h2></div><button class="add-btn" onclick="alert('Add news form would go here')">+ Add News</button><div id="newsTable"></div></div><div class="tab-content" id="galleryTab"><div class="content-header"><h2>Gallery</h2></div><button class="add-btn" onclick="alert('Add photo form would go here')">+ Add Photo</button><div id="galleryTable"></div></div><div class="tab-content" id="applicationsTab"><div class="content-header"><h2>Applications</h2></div><div id="appsTable"></div></div></div></div></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const SUPABASE_URL='https://dwsvxrucgixlfvoltnqj.supabase.co';const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3c3Z4cnVjZ2l4bGZ2b2x0bnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTQ0NjcsImV4cCI6MjA4ODQ3MDQ2N30.36W-BNx9kNNpvRlaOz0YpKmroG6CVh5-Aj-M-9JSuWQ';const {createClient}=window.supabase;const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);const loginScreen=document.getElementById('loginScreen');const adminContainer=document.getElementById('adminContainer');const loginForm=document.getElementById('loginForm');const logoutBtn=document.getElementById('logoutBtn');document.querySelectorAll('.sidebar-item').forEach(item=>{item.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));item.classList.add('active');document.getElementById(item.dataset.tab+'Tab').classList.add('active')})});loginForm.addEventListener('submit',async e=>{e.preventDefault();const email=document.getElementById('email').value;const password=document.getElementById('password').value;document.getElementById('loginError').innerHTML='';const {data,error}=await supabase.auth.signInWithPassword({email,password});if(error){document.getElementById('loginError').textContent='Invalid credentials';return}loginScreen.style.display='none';adminContainer.classList.add('active');loadAllData()});logoutBtn.addEventListener('click',async ()=>{await supabase.auth.signOut();loginScreen.style.display='flex';adminContainer.classList.remove('active');loginForm.reset()});async function loadAllData(){const [p,f,n,g,a]=await Promise.all([fetch(`${SUPABASE_URL}/rest/v1/players`,{headers:{'apikey':SUPABASE_KEY}}),fetch(`${SUPABASE_URL}/rest/v1/fixtures`,{headers:{'apikey':SUPABASE_KEY}}),fetch(`${SUPABASE_URL}/rest/v1/news`,{headers:{'apikey':SUPABASE_KEY}}),fetch(`${SUPABASE_URL}/rest/v1/gallery`,{headers:{'apikey':SUPABASE_KEY}}),fetch(`${SUPABASE_URL}/rest/v1/applications`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}})]);const [pd,fd,nd,gd,ad]=await Promise.all([p.json(),f.json(),n.json(),g.json(),a.json()]);displayPlayers(pd);displayFixtures(fd);displayNews(nd);displayGallery(gd);displayApps(ad)}function displayPlayers(d){const c=document.getElementById('playersTable');if(!d?.length){c.innerHTML='<div class="empty-state">No players yet</div>';return}c.innerHTML=`<table><tr><th>Name</th><th>Jersey</th><th>Position</th><th>Actions</th></tr>${d.map(p=>`<tr><td>${p.name}</td><td>${p.jersey||'—'}</td><td>${p.position||'—'}</td><td><button class="action-btn edit">Edit</button><button class="action-btn delete">Delete</button></td></tr>`).join('')}</table>`}function displayFixtures(d){const c=document.getElementById('fixturesTable');if(!d?.length){c.innerHTML='<div class="empty-state">No fixtures yet</div>';return}c.innerHTML=`<table><tr><th>Date</th><th>Opponent</th><th>Status</th><th>Actions</th></tr>${d.map(f=>`<tr><td>${new Date(f.match_date).toLocaleDateString()}</td><td>${f.opponent}</td><td>${f.status}</td><td><button class="action-btn edit">Edit</button><button class="action-btn delete">Delete</button></td></tr>`).join('')}</table>`}function displayNews(d){const c=document.getElementById('newsTable');if(!d?.length){c.innerHTML='<div class="empty-state">No news yet</div>';return}c.innerHTML=`<table><tr><th>Title</th><th>Date</th><th>Actions</th></tr>${d.map(n=>`<tr><td>${n.title}</td><td>${new Date(n.created_at).toLocaleDateString()}</td><td><button class="action-btn edit">Edit</button><button class="action-btn delete">Delete</button></td></tr>`).join('')}</table>`}function displayGallery(d){const c=document.getElementById('galleryTable');if(!d?.length){c.innerHTML='<div class="empty-state">No photos yet</div>';return}c.innerHTML=`<table><tr><th>Caption</th><th>Date</th><th>Actions</th></tr>${d.map(g=>`<tr><td>${g.caption||'—'}</td><td>${new Date(g.created_at).toLocaleDateString()}</td><td><button class="action-btn delete">Delete</button></td></tr>`).join('')}</table>`}function displayApps(d){const c=document.getElementById('appsTable');if(!d?.length){c.innerHTML='<div class="empty-state">No applications yet</div>';return}c.innerHTML=`<table><tr><th>Name</th><th>Type</th><th>Email</th><th>Actions</th></tr>${d.map(a=>`<tr><td>${a.name}</td><td>${a.type}</td><td>${a.email}</td><td><button class="action-btn delete">Delete</button></td></tr>`).join('')}</table>`}</script></body></html>
