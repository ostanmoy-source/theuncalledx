<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Join Us - The Uncalled X</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet"><style>:root{--primary:#00FF00;--dark:#0a0a0a;--darker:#000000;--white:#FFF;--gray:#1a1a1a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--darker);color:var(--white)}nav{position:fixed;top:0;left:0;right:0;padding:1.5rem 3rem;z-index:1000;display:flex;justify-content:space-between;align-items:center}.logo{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--primary),#33FF33);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-links{display:flex;gap:3rem;list-style:none}.nav-links a{color:var(--white);text-decoration:none;font-family:'Orbitron',sans-serif;position:relative}.nav-links a::before{content:'';position:absolute;bottom:-5px;left:0;width:0;height:3px;background:var(--primary);transition:width 0.4s}.nav-links a:hover::before,.nav-links a.active::before{width:100%}.nav-links a:hover{color:var(--primary)}.page-header{margin-top:70px;padding:100px 2rem 60px;background:linear-gradient(135deg,var(--dark),var(--darker));border-bottom:3px solid var(--primary);text-align:center}.page-header h1{font-size:clamp(2.5rem,8vw,3.5rem);background:linear-gradient(135deg,var(--primary),#33FF33);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.section{padding:3rem 2rem;background:var(--darker)}.form-box{max-width:600px;margin:0 auto;background:rgba(0,255,0,0.05);border:2px solid var(--primary);padding:3rem}.form-box input,.form-box textarea,.form-box select{width:100%;padding:0.8rem;background:var(--darker);border:1px solid var(--primary);color:var(--white);margin-bottom:1.5rem;font-family:'Inter',sans-serif}.btn{padding:1rem 2.5rem;background:var(--primary);color:var(--darker);border:none;cursor:pointer;font-weight:700;font-family:'Bebas Neue',sans-serif;text-transform:uppercase;width:100%;transition:all 0.3s}.btn:hover{box-shadow:0 0 30px rgba(0,255,0,0.7);transform:scale(1.05)}footer{background:linear-gradient(135deg,var(--dark),var(--darker));border-top:3px solid var(--primary);padding:5rem 2rem 2rem}.footer-content{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:3rem;margin-bottom:3rem}</style></head><body><nav id="navbar"><div class="logo">UnX</div><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="team.html">Team</a></li><li><a href="fixtures.html">Fixtures</a></li><li><a href="news.html">News</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="join.html" class="active">Join Us</a></li></ul></nav><div class="page-header"><h1>JOIN US</h1></div><section class="section"><div class="form-box"><form id="joinForm"><label style="display:block;color:var(--primary);margin-bottom:0.5rem">Name</label><input type="text" name="name" required><label style="display:block;color:var(--primary);margin-bottom:0.5rem">Email</label><input type="email" name="email" required><label style="display:block;color:var(--primary);margin-bottom:0.5rem">Phone</label><input type="tel" name="phone" required><label style="display:block;color:var(--primary);margin-bottom:0.5rem">Message</label><textarea name="message" style="height:120px" required></textarea><button type="submit" class="btn">SUBMIT</button></form></div></section><footer><div class="footer-content"><div class="footer-section"><p style="color:#888">The Uncalled X</p></div></div></footer><script>const SUPABASE_URL='https://dwsvxrucgixlfvoltnqj.supabase.co';const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3c3Z4cnVjZ2l4bGZ2b2x0bnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTQ0NjcsImV4cCI6MjA4ODQ3MDQ2N30.36W-BNx9kNNpvRlaOz0YpKmroG6CVh5-Aj-M-9JSuWQ';document.getElementById('joinForm').addEventListener('submit',async e=>{e.preventDefault();const f=new FormData(e.target);await fetch(`${SUPABASE_URL}/rest/v1/applications`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({name:f.get('name'),email:f.get('email'),phone:f.get('phone'),message:f.get('message'),type:'player',age:null,position:null})});alert('Submitted!');e.target.reset()});</script></body></html>
