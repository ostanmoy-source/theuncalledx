<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gallery - The Uncalled X</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet"><style>:root{--primary:#00FF00;--dark:#0a0a0a;--darker:#000000;--white:#FFF;--gray:#1a1a1a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--darker);color:var(--white)}nav{position:fixed;top:0;left:0;right:0;padding:1.5rem 3rem;z-index:1000;display:flex;justify-content:space-between;align-items:center;transition:all 0.4s}nav.scrolled{background:rgba(10,10,10,0.92);backdrop-filter:blur(10px)}h1,h2{font-family:'Bebas Neue',sans-serif;text-transform:uppercase;letter-spacing:2px}.logo{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--primary),#33FF33);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-links{display:flex;gap:3rem;list-style:none}.nav-links a{color:var(--white);text-decoration:none;font-size:0.9rem;font-family:'Orbitron',sans-serif;position:relative;transition:all 0.3s}.nav-links a::before{content:'';position:absolute;bottom:-5px;left:0;width:0;height:3px;background:var(--primary);transition:width 0.4s}.nav-links a:hover::before,.nav-links a.active::before{width:100%}.nav-links a:hover{color:var(--primary);text-shadow:0 0 10px var(--primary)}.page-header{margin-top:70px;padding:100px 2rem 60px;background:linear-gradient(135deg,var(--dark),var(--darker));border-bottom:3px solid var(--primary);text-align:center}.page-header h1{font-size:clamp(2.5rem,8vw,3.5rem);background:linear-gradient(135deg,var(--primary),#33FF33);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.section{padding:3rem 2rem;background:var(--darker)}.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2rem;max-width:1400px;margin:0 auto}.gallery-item{cursor:pointer;border:2px solid var(--primary);overflow:hidden;aspect-ratio:1;transition:all 0.3s}.gallery-item img{width:100%;height:100%;object-fit:cover}.gallery-item:hover{box-shadow:0 0 30px rgba(0,255,0,0.4);transform:scale(1.05)}.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(5px)}.lightbox.active{display:flex}.lightbox-image{max-width:90%;max-height:90%;border:2px solid var(--primary)}footer{background:linear-gradient(135deg,var(--dark),var(--darker));border-top:3px solid var(--primary);padding:5rem 2rem 2rem}.footer-content{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:3rem;margin-bottom:3rem}.footer-section a{display:block;color:#999;text-decoration:none;margin-bottom:0.9rem;transition:all 0.3s}.footer-section a:hover{color:var(--primary);transform:translateX(8px)}.footer-logo{font-size:1.8rem;font-weight:900;font-family:'Orbitron',sans-serif;background:linear-gradient(135deg,var(--primary),#33FF33);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}</style></head><body><nav id="navbar"><div class="logo">UnX</div><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="team.html">Team</a></li><li><a href="fixtures.html">Fixtures</a></li><li><a href="news.html">News</a></li><li><a href="gallery.html" class="active">Gallery</a></li><li><a href="join.html">Join Us</a></li></ul></nav><div class="page-header"><h1>GALLERY</h1></div><section class="section"><div class="gallery-grid" id="galleryContainer"><div style="text-align:center;grid-column:1/-1;padding:4rem">Loading...</div></div></section><div id="lightbox" class="lightbox"><img id="lightboxImage" class="lightbox-image"></div><footer><div class="footer-content"><div class="footer-section"><div class="footer-logo">UnX</div><p style="color:#888">The Uncalled X</p></div><div class="footer-section"><h3 style="color:var(--primary);margin-bottom:1rem">Links</h3><a href="index.html">Home</a><a href="team.html">Team</a></div></div></footer><script>const SUPABASE_URL='https://dwsvxrucgixlfvoltnqj.supabase.co';const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3c3Z4cnVjZ2l4bGZ2b2x0bnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTQ0NjcsImV4cCI6MjA4ODQ3MDQ2N30.36W-BNx9kNNpvRlaOz0YpKmroG6CVh5-Aj-M-9JSuWQ';window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>50));async function loadGallery(){const r=await fetch(`${SUPABASE_URL}/rest/v1/gallery?order=created_at.desc`,{headers:{'apikey':SUPABASE_KEY}});const d=await r.json();const c=document.getElementById('galleryContainer');if(!d?.length){c.innerHTML='<div style="text-align:center;grid-column:1/-1;padding:4rem">No photos</div>';return}c.innerHTML=d.map((i,idx)=>`<div class="gallery-item" onclick="openLightbox('${i.image_url}')"><img src="${i.image_url}" alt=""></div>`).join('')}function openLightbox(src){document.getElementById('lightboxImage').src=src;document.getElementById('lightbox').classList.add('active')}document.getElementById('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')document.getElementById('lightbox').classList.remove('active')});document.addEventListener('DOMContentLoaded',loadGallery);</script></body></html>
